spring.application.name=subscription-service

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

google.client.id=${GOOGLE_CLIENT_ID}

jwt.secret=${JWT_SECRET}
jwt.issuer=${JWT_ISSUER:subtrak-api}
jwt.audience=${JWT_AUDIENCE:subtrak-web}

app.sendgrid.apiKey=${SENDGRID_API_KEY}
app.sendgrid.fromEmail=${SENDGRID_FROM_EMAIL}
app.sendgrid.fromName=${SENDGRID_FROM_NAME}
app.sendgrid.eventWebhookPublicKey=${SENDGRID_EVENT_WEBHOOK_PUBLIC_KEY:}
app.public-api-url=${PUBLIC_API_URL:https://localhost:8080}

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

app.frontend.origins=${FRONTEND_ORIGINS:https://localhost:5173,https://subtrak-sable.vercel.app}
app.auth.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:true}
app.auth.refresh-cookie.same-site=${REFRESH_COOKIE_SAME_SITE:None}
