spring.application.name=subscription-service

spring.datasource.url=jdbc:postgresql://localhost:5432/subscription
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

google.client.id=${GOOGLE_CLIENT_ID}

jwt.secret=${JWT_SECRET}

app.sendgrid.apiKey=${SENDGRID_API_KEY}
app.sendgrid.fromEmail=${SENDGRID_FROM_EMAIL}
app.sendgrid.fromName=${SENDGRID_FROM_NAME}